<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Random Coffee GIF</title>
  <meta property="og:title" content="Random Coffee GIF">
  <meta property="og:type" content="website">
  <!-- og:image is set to an absolute URL by the script below -->
  <meta property="og:image" id="og-image" content="">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" id="twitter-image" content="">
  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #111;
      font-family: sans-serif;
      color: #fff;
    }
    img {
      max-width: 90vw;
      max-height: 80vh;
    }
    button {
      margin-top: 16px;
      padding: 8px 20px;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <img id="gif" src="" alt="random coffee gif">
  <button onclick="next()">Next</button>

  <script>
    const total = 100;

    function gifName(n) {
      return 'coffee_' + String(n).padStart(3, '0') + '.gif';
    }

    function show(n) {
      const name = gifName(n);
      const absURL = location.origin + location.pathname.replace(/[^/]*$/, '') + 'coffee_gifs/' + name;

      document.getElementById('gif').src = 'coffee_gifs/' + name;
      document.getElementById('og-image').content = absURL;
      document.getElementById('twitter-image').content = absURL;

      // Update ?gif= so copying the URL gives Slack a unique, scrapeable link
      history.replaceState(null, '', '?gif=' + n);
    }

    function next() {
      show(Math.floor(Math.random() * total) + 1);
    }

    // On load: honour ?gif= if present, otherwise pick randomly
    const params = new URLSearchParams(location.search);
    const initial = parseInt(params.get('gif'), 10);
    show((initial >= 1 && initial <= total) ? initial : Math.floor(Math.random() * total) + 1);
  </script>
</body>
</html>
